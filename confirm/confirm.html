<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nostr Map Signer</title>
  <style>
    @font-face { font-family:"Inter"; font-weight:400; font-display:swap;
      src:url("../fonts/inter-latin-400-normal.woff2") format("woff2"); }
    @font-face { font-family:"Inter"; font-weight:600; font-display:swap;
      src:url("../fonts/inter-latin-600-normal.woff2") format("woff2"); }
    @font-face { font-family:"Inter"; font-weight:700; font-display:swap;
      src:url("../fonts/inter-latin-700-normal.woff2") format("woff2"); }
    @font-face { font-family:"Inter"; font-weight:800; font-display:swap;
      src:url("../fonts/inter-latin-700-normal.woff2") format("woff2"); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 460px;
      height: 420px;
      overflow: hidden;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #e2e8f0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(139,92,246,.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(6,182,212,.16) 0%, transparent 50%),
        #0a0a0f;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex; align-items: center; gap: 9px;
      padding: 13px 18px 11px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .top-bar svg { width: 22px; height: 22px; flex-shrink: 0; }
    .top-bar-brand {
      font-size: 13px; font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.01em;
    }
    .top-bar-sep { color: rgba(255,255,255,.2); font-size: 12px; }
    .top-bar-label {
      font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .08em;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 22px 16px;
      gap: 8px;
      text-align: center;
    }

    .site-avatar {
      width: 58px; height: 58px;
      border-radius: 18px;
      background: rgba(139,92,246,.15);
      border: 1px solid rgba(139,92,246,.3);
      display: grid; place-items: center;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .site-domain {
      font-size: 26px; font-weight: 800;
      letter-spacing: -.02em; color: #fff;
    }

    .site-action { font-size: 14px; color: #64748b; line-height: 1.4; }

    /* ── Payment block (webln) ── */
    .payment-block {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, rgba(139,92,246,.12), rgba(6,182,212,.08));
      border: 1px solid rgba(139,92,246,.3);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .payment-label {
      font-size: 12px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .payment-amount {
      font-size: 36px; font-weight: 800;
      color: #fbbf24;
      letter-spacing: -.03em;
      line-height: 1.1;
    }
    .payment-unit { font-size: 16px; font-weight: 600; color: #f59e0b; }

    /* ── Detail block (sign) ── */
    .detail {
      width: 100%;
      margin-top: 6px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
    }
    .detail-kind {
      font-size: 12px; font-weight: 700; color: #8b5cf6;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px;
    }
    .detail-preview { font-size: 14px; color: #94a3b8; line-height: 1.55; word-break: break-word; }
    .detail-tags {
      margin-top: 8px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 8px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .detail-tag {
      font-size: 11.5px; color: #64748b; font-family: "SF Mono","Fira Code",monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-tag span { color: #a78bfa; margin-right: 4px; }

    /* ── Always allow ── */
    .always-allow {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 0 2px; cursor: pointer; user-select: none;
    }
    .always-allow input { width: 16px; height: 16px; accent-color: #8b5cf6; cursor: pointer; flex-shrink: 0; }
    .always-allow span  { font-size: 14px; color: #64748b; }

    /* ── Actions ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 18px 16px;
      flex-shrink: 0;
    }

    .btn-approve {
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: #fff; border: none; border-radius: 12px; padding: 16px;
      font: 700 15px/1 "Inter", system-ui; cursor: pointer;
      box-shadow: 0 4px 20px rgba(139,92,246,.4);
      transition: filter .15s, transform .12s;
    }
    .btn-approve:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-approve:disabled { opacity: .5; cursor: not-allowed; }

    .btn-reject {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #94a3b8; border-radius: 12px; padding: 16px;
      font: 700 15px/1 "Inter", system-ui; cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-reject:hover:not(:disabled) { background: rgba(239,68,68,.14); color: #f87171; border-color: rgba(239,68,68,.3); }
    .btn-reject:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Timer ── */
    .timer {
      height: 3px; background: rgba(255,255,255,.06);
      margin: 0 18px 14px; border-radius: 99px; overflow: hidden; flex-shrink: 0;
    }
    .timer-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      transform-origin: left center;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="top-bar">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="nm-g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="#13131a"/>
      <text x="16" y="23" text-anchor="middle" font-size="20" font-family="serif" fill="url(#nm-g)">✦</text>
    </svg>
    <span class="top-bar-brand">Nostr Map ✦</span>
    <span class="top-bar-sep">·</span>
    <span class="top-bar-label" id="bar-title">Signer</span>
  </div>

  <div class="body">
    <div class="site-avatar" id="site-avatar">🌐</div>
    <div class="site-domain"  id="site-domain">…</div>
    <div class="site-action"  id="site-action">Demande en cours…</div>

    <!-- Paiement Lightning -->
    <div id="payment-block" class="payment-block hidden">
      <div class="payment-label">Montant à payer</div>
      <div class="payment-amount" id="payment-amount">—</div>
      <div class="payment-unit">sats</div>
    </div>

    <!-- Détail signature -->
    <div id="request-detail" class="detail hidden">
      <div class="detail-kind"    id="detail-kind"></div>
      <div class="detail-preview" id="detail-preview"></div>
      <div class="detail-tags"    id="detail-tags"></div>
    </div>

    <label id="always-allow-row" class="always-allow hidden" style="margin-top:8px">
      <input id="always-allow" type="checkbox"/>
      <span>Faire confiance à ce site (signature silencieuse activée)</span>
    </label>
  </div>

  <div class="actions">
    <button id="btn-approve" class="btn-approve" type="button">✓ Autoriser</button>
    <button id="btn-reject"  class="btn-reject"  type="button">✗ Refuser</button>
  </div>

  <div class="timer">
    <div id="timer-fill" class="timer-fill"></div>
  </div>

<script src="confirm.js"></script>
</body>
</html>
